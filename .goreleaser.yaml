version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: prompt-library
    main: ./cmd/prompt-library
    binary: prompt-library
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: ohare93
    name: prompt-library
  draft: false
  prerelease: auto

brews:
  - name: prompt-library
    repository:
      owner: ohare93
      name: tap
    directory: Formula
    homepage: https://github.com/ohare93/prompt-library
    description: Serve markdown prompt files as @ mention resources in Claude Code
    license: MIT
    install: |
      bin.install "prompt-library"
    test: |
      system "#{bin}/prompt-library", "--version"

scoops:
  - name: prompt-library
    repository:
      owner: ohare93
      name: scoop
    directory: bucket
    homepage: https://github.com/ohare93/prompt-library
    description: Serve markdown prompt files as @ mention resources in Claude Code
    license: MIT
